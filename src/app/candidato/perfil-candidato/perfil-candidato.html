
<!-- SEU GRID -->
<div class="container">
  <!-- Mensagem de carregamento -->
  <div *ngIf="carregando" class="loading">
    <p>⏳ Carregando candidatos...</p>
  </div>

  <!-- Mensagem de erro -->
  <div *ngIf="erro && !carregando" class="error-msg">
    <p>⚠️ {{ erro }}</p>
  </div>

  <!-- Grid de candidatos -->
  <div class="grid">
    <div *ngFor="let c of candidatos" class="card">
      <div class="name">{{ c.nome }}</div>
      <div class="status">ATIVO</div>
      <div class="partido">{{ c.partido }}</div>
      <div class="idade">Idade: {{ c.idade || 'Não informada' }} anos</div>
      <p class="partido">{{ c.descricao }}</p>
      <span class="partido">{{ c.slogan }}</span>
      <div class="footer">
        <div class="lock"><i class="fa-solid fa-shield-alt"></i></div>
        <h4 class="io">CONTAGEM BLOQUEADA</h4>
        <p>Aguardando liberação oficial do CNE</p>
      </div>
    </div>
  </div>

  <!-- Debug: Quantidade de candidatos -->
  <div class="debug">
    <strong>Total de candidatos: {{ candidatos.length }}</strong>
  </div>
</div>
