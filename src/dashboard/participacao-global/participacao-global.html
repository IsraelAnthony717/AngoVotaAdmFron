<body>
  <div class="card">
    <div class="barra">
      <h3 class="title">Participação Global</h3>
    </div>

    <div class="content">
      <div class="circle-container">
        <svg width="100%" height="100%" viewBox="0 0 200 200">
          <circle
            class="bg"
            cx="100"
            cy="100"
            r="80"
          />
          <circle
            class="progress"
            cx="100"
            cy="100"
            r="80"
            [attr.stroke-dashoffset]="strokeDashoffset"
          />
        </svg>

        <div class="percentage">
          <h1>{{ afluencia }}%</h1>
          <p>Afluência</p>
        </div>
      </div>

      <div class="stats">
        <div class="item">
          <span class="dot blue"></span>
          <div>
            <p>Votaram</p>
            <strong>{{ votaram | number }}</strong>
          </div>
        </div>

        <div class="item">
          <span class="dot gray"></span>
          <div>
            <p>Abstenção</p>
            <strong>{{ abstencao | number }}</strong>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
